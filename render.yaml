services:
  - type: static
    name: portfolio
    buildCommand: npm install && npm run build
    staticPublishPath: ./dist
    headers:
      - path: /
        headers:
          - key: Cache-Control
            value: public, max-age=0, must-revalidate
      - path: /assets/*
        headers:
          - key: Cache-Control
            value: public, max-age=31536000, immutable
      - path: /manifest.json
        headers:
          - key: Cache-Control
            value: public, max-age=0, must-revalidate
    routes:
      - path: /*
        destination: /index.html
        match: miss
